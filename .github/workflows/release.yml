name: Release

# Triggered by pushing a tag matching v*.*.*  (e.g. `git tag v0.1.0 && git push --tags`).
# Builds, tests, and publishes to npm with provenance — the published tarball
# is Sigstore-signed and tied to this exact workflow run. Users can verify
# with `npm audit signatures`.
#
# Auth: npm Trusted Publishing (OIDC). No secrets — the trusted publisher is
# configured at npmjs.com/package/xhood/access and must name this repo and
# this workflow filename exactly. npm does not validate that config when you
# save it, so a mismatch only shows up here as a 404/ENEEDAUTH on publish.
#
# Required workflow permissions (already declared below):
#   contents: write  — to create the GitHub Release.
#   id-token: write  — for npm provenance via OIDC. No long-lived secret needed.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Guard against tag/package.json drift — the tag (v0.1.0) must match package.json (0.1.0).
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi
      # Auth comes from OIDC (trusted publishing) — no NPM_TOKEN secret. The
      # `id-token: write` permission above is what makes it work; provenance
      # is implied by trusted publishing but stays explicit for clarity.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
